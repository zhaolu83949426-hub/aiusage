name: Release Patch

on:
  workflow_dispatch:
    inputs:
      description:
        description: 'Release notes (markdown supported)'
        required: true
        type: string

env:
  REGISTRY: docker.io
  IMAGE_NAME: juliantanx/aiusage

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump patch version
        id: version
        run: |
          CURRENT=$(node -p "require('./packages/cli/package.json').version")
          IFS='.' read -r major minor patch <<< "$CURRENT"
          NEW="${major}.${minor}.$((patch + 1))"
          echo "version=${NEW}" >> $GITHUB_OUTPUT
          echo "Bumping ${CURRENT} → ${NEW}"
          node -e "
            const fs = require('fs');
            ['packages/core/package.json', 'packages/cli/package.json'].forEach(f => {
              const pkg = JSON.parse(fs.readFileSync(f, 'utf-8'));
              pkg.version = '${NEW}';
              fs.writeFileSync(f, JSON.stringify(pkg, null, 2) + '\n');
            });
          "

      - name: Update CHANGELOG
        env:
          DESCRIPTION: ${{ github.event.inputs.description }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          node -e "
            const fs = require('fs');
            const date = new Date().toISOString().slice(0, 10);
            const version = process.env.VERSION;
            const description = process.env.DESCRIPTION;
            const entry = '## [' + version + '] - ' + date + '\n\n' + description + '\n\n---\n\n';
            const changelog = fs.readFileSync('CHANGELOG.md', 'utf-8');
            const updated = changelog.replace(/^(# Changelog\n)/, '\$1\n' + entry);
            fs.writeFileSync('CHANGELOG.md', updated);
          "

      - name: Build
        run: pnpm build

      - name: Publish to npm
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          pnpm publish --filter @juliantanx/aiusage --no-git-checks --access public

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          readme-filepath: ./README.md

      - name: Commit, tag and push
        run: |
          VERSION=${{ steps.version.outputs.version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/core/package.json packages/cli/package.json CHANGELOG.md
          git commit -m "chore: bump version to ${VERSION}"
          git tag "v${VERSION}"
          git push origin main --follow-tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: ${{ github.event.inputs.description }}
